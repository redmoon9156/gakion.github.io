<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>Shop — Gakion</title>
  <meta name="description" content="Shop — Gakion" />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;500;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" as="style" crossorigin
        href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@latest/dist/web/static/pretendard.css" />

  <style>
    :root{
      --bg:#ffffff;
      --fg:#111111;
      --muted:#666666;
      --max:1060px;
      --pad:18px;
      --shadow: 0 18px 50px rgba(0,0,0,.12);
      --menu-ease: cubic-bezier(0.77, 0, 0.175, 1);
    }

    *{ margin: 0; padding: 0; box-sizing:border-box; }
    html, body{ height:100%; }

    body{
      background:var(--bg);
      color:var(--fg);
      font-family: Pretendard, Arial, "Helvetica Neue", Helvetica, sans-serif;
      font-size:14px;
      line-height:1.6;
      letter-spacing:.15px;
      -webkit-font-smoothing:antialiased;
      -moz-osx-font-smoothing:grayscale;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      overflow-x: hidden;
    }

    a{ color:inherit; text-decoration:none; display: inline-block; }
    button{ font: inherit; }

    .wrap{
      max-width:var(--max);
      margin:0 auto;
      padding:0 var(--pad);
      width: 100%;
    }

    /* [Header] */
    header{
      background:#ffffff;
      position: fixed;
      top: 0;
      width: 100%;
      padding: 16px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      z-index: 2000;
    }

    .brand{
      font-family:"Montserrat", sans-serif;
      font-size: 22.5px;
      font-weight: 700;
      letter-spacing: 0.35px;
      display:inline-flex;
      align-items:center;
      gap:10px;
      line-height: 1.1;
    }

    .brand-mark{
      height:1em;
      width:auto;
      display:block;
      object-fit:contain;
      flex:0 0 auto;
      transform: translateY(0.02em);
    }

    nav.desktop{
      display:none;
      gap:18px;
      align-items:center;
      font-size:13px;
      letter-spacing:.6px;
      white-space:nowrap;
    }

    nav.desktop a{
      font-family:"Montserrat", sans-serif;
      font-weight:600;
      padding: 8px 4px;
      color: rgba(0,0,0,.82);
    }
    nav.desktop a:hover{ color: rgba(0,0,0,1); }

    .menu-btn{
      cursor: pointer;
      width: 24px;
      height: 18px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      border: 0;
      background: transparent;
      z-index: 2001;
      user-select:none;
    }

    .menu-btn span{
      display: block;
      width: 100%;
      height: 1px;
      background-color: #000;
      transition: 0.3s var(--menu-ease);
    }

    /* [Nav Overlay] */
    .nav-overlay {
      position: fixed;
      top: -100%;
      left: 0;
      width: 100%;
      height: 58dvh;
      background-color: #fff;
      z-index: 1500;
      transition: top 0.5s var(--menu-ease);
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding-top: 100px;
      box-shadow: 0 8px 28px 0 rgba(0,0,0,0.07);
    }

    /* [추가] 외부 클릭 보호용 투명 방어막 */
    .overlay-dimmer {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(255, 255, 255, 0); 
      z-index: 1400; 
      display: none;
    }
    body[data-menu-open="true"] .overlay-dimmer { display: block; }

    body[data-menu-open="true"] .nav-overlay {
      top: 0;
    }

    body[data-menu-open="true"] .menu-btn span:nth-child(1) { transform: translateY(8.5px) rotate(45deg); }
    body[data-menu-open="true"] .menu-btn span:nth-child(2) { opacity: 0; }
    body[data-menu-open="true"] .menu-btn span:nth-child(3) { transform: translateY(-8.5px) rotate(-45deg); }

    .drawer-nav{
      display:flex;
      flex-direction:column;
      align-items:center;
      text-align:center;
    }

    .drawer-nav a{
      font-family:"Montserrat", sans-serif;
      font-weight: 300;
      font-size: 1.1rem;
      letter-spacing: 0.1em;
      padding: 15px 0;
      color: rgba(0,0,0,.86);
      width: 100%;
    }

    /* Main Content */
    main{ padding: 140px 0 80px; flex: 1; }
    .page-title{ font-family:"Montserrat", sans-serif; font-size: 28px; font-weight: 700; letter-spacing: .2px; margin-bottom: 22px; text-align: center; }

    .shop-grid{
      display:grid;
      grid-template-columns: min(420px, 100%);
      justify-content: center;
      gap: 22px;
    }

    .shop-card{ position: relative; display:block; cursor: pointer; }

    .thumb{
      width:100%;
      aspect-ratio: 1 / 1; 
      overflow:hidden;
      background:#f5f5f5;
      line-height: 0;
    }

    .thumb img{
      width:100%;
      height:100%;
      object-fit: cover; 
      display:block;
      transition: filter .18s ease, transform .18s ease;
    }

    .overlay{
      position:absolute;
      inset:0;
      display:flex;
      align-items:center;
      justify-content:center;
      padding: 14px;
      background: rgba(0,0,0,.50);
      opacity: 0;
      transition: opacity .18s ease;
      pointer-events: none;
    }

    .overlay .ov-text{ text-align:center; color:#fff; }
    .overlay .ov-text .t1{ font-weight:700; font-size: 20px; }
    .overlay .ov-text .t2, .overlay .ov-text .t3{ font-weight:600; font-size: 16px; margin-top: 8px; opacity: .95; }

    .overlay-link{ display:inline-block; color:#fff; }

    .shop-card:hover .thumb img, .shop-card.is-active .thumb img{ filter: blur(2.2px) brightness(.92); transform: scale(1.01); }
    .shop-card:hover .overlay, .shop-card.is-active .overlay{ opacity: 1; pointer-events: auto; }

    @media (max-width: 520px){
      .shop-grid{ grid-template-columns: min(320px, 92vw); }
    }

    footer{ padding: 24px 0 34px; text-align:center; font-size: 12.5px; color: rgba(0,0,0,.56); }

    @media (min-width:1024px){
      header { padding: 60px 80px; position: absolute; }
      nav.desktop { display:flex; }
      .menu-btn { display:none; }
      
      .nav-overlay {
        top: 0; 
        left: 100%; 
        width: 450px; 
        height: 100vh;
        transition: left 0.5s var(--menu-ease);
        border-left: 1px solid #eee;
        justify-content: flex-start;
        padding: 180px 0 0 80px;
        box-shadow: none;
      }
      body[data-menu-open="true"] .nav-overlay {
        left: calc(100% - 450px);
      }

      /* PC 디머 너비 조정 */
      body[data-menu-open="true"] .overlay-dimmer { width: calc(100% - 450px); }

      .drawer-nav { text-align: left; align-items: flex-start; }
      .drawer-nav a { font-size: 1rem; padding: 18px 0; }

      main { padding: 220px 0 90px; }
      .page-title { font-size: 32px; }
    }
  </style>
</head>

<body>
  <header>
    <a class="brand" href="index.html">
      <img class="brand-mark" src="images/home/late_autumn.png" alt="Logo" />
      <span>Gakion</span>
    </a>
    <nav class="desktop">
      <a href="cv.html">CV</a>
      <a href="works.html">Works</a>
      <a href="contact.html">Contact</a>
      <a href="shop.html">Shop</a>
    </nav>
    <button class="menu-btn" type="button" id="menuOpenBtn" onclick="toggleMenu()">
      <span></span>
      <span></span>
      <span></span>
    </button>
  </header>

  <div id="overlayDimmer" class="overlay-dimmer" onclick="toggleMenu()"></div>

  <nav class="nav-overlay" id="navOverlay">
    <div class="drawer-nav">
      <a href="cv.html" onclick="toggleMenu()">CV</a>
      <a href="works.html" onclick="toggleMenu()">Works</a>
      <a href="contact.html" onclick="toggleMenu()">Contact</a>
      <a href="shop.html" onclick="toggleMenu()">Shop</a>
    </div>
  </nav>

  <main>
    <div class="wrap">
      <div class="page-title">Available Books</div>
      <section class="shop-grid">
        <div class="shop-card" id="shopCardA">
          <div class="thumb">
            <img src="images/shop/shop_work_A1.PNG" alt="Fox Dream cover" draggable="false">
          </div>
          <div class="overlay">
            <div class="ov-text">
              <a class="overlay-link" href="shop_work_A.html">
                <div class="t1">Fox Dream</div>
                <div class="t2">Somebooks</div>
                <div class="t3">2026</div>
              </a>
            </div>
          </div>
        </div>
      </section>
    </div>
  </main>

  <footer>
    <div class="wrap">
      <div class="copyright">© Gakion. All rights reserved.</div>
    </div>
  </footer>

  <script>
    function toggleMenu() {
      const body = document.body;
      const isMenuOpen = body.dataset.menuOpen === "true";
      if (isMenuOpen) {
        body.dataset.menuOpen = "false";
        body.style.overflow = "";
      } else {
        body.dataset.menuOpen = "true";
        body.style.overflow = "hidden";
      }
    }
    // 기존 mousedown 대신 dimmer onclick 제어 방식으로 일원화했습니다.

    (function () {
      const card = document.getElementById("shopCardA");
      if(card) {
        card.addEventListener("click", function(e) {
          if(!e.target.closest(".ov-text")) {
            this.classList.toggle("is-active");
          }
        });
      }
      document.addEventListener("contextmenu", (e) => { if(e.target.tagName === "IMG") e.preventDefault(); });
    })();
  </script>
</body>
</html>
