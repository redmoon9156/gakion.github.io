<!doctype html>
<html lang="en">
<body>
  <script>
    function toggleMenu() {
      const body = document.body;
      const isMenuOpen = body.dataset.menuOpen === "true";
      if (isMenuOpen) {
        body.dataset.menuOpen = "false";
        body.style.overflow = "";
      } else {
        body.dataset.menuOpen = "true";
        body.style.overflow = "hidden";
      }
    }

    (function () {
      const card = document.getElementById("shopCardA");

      // 1. 카드 클릭 시 동작 (기존 코드 활용)
      if(card) {
        card.addEventListener("click", function(e) {
          // [핵심 추가] 카드를 클릭했을 때, 이 이벤트가 바닥(document)까지 퍼지지 않게 막음
          e.stopPropagation(); 
          
          if(!e.target.closest(".ov-text")) {
            this.classList.toggle("is-active");
          }
        });
      }

      // 2. 카드 바깥(이미지 주변 빈 공간) 클릭 시 동작 추가
      document.addEventListener("click", function() {
        if(card) card.classList.remove("is-active");
      });

      document.addEventListener("contextmenu", (e) => { if(e.target.tagName === "IMG") e.preventDefault(); });
    })();
  </script>
</body>
</html>
