<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>Works — Gakion</title>
  <meta name="description" content="Works — Gakion" />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;500;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" as="style" crossorigin
        href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@latest/dist/web/static/pretendard.css" />

  <style>
    :root{
      --bg:#ffffff;
      --fg:#111111;
      --muted:#666666;
      --max:1060px;
      --pad:18px;
      --shadow: 0 18px 50px rgba(0,0,0,.12);
      /* ✅ 봉금 스타일: 1.5초의 부드러운 전환 */
      --fade-dur: 1500ms;
      --menu-ease: cubic-bezier(0.77, 0, 0.175, 1);
    }

    *{ margin: 0; padding: 0; box-sizing:border-box; }
    html, body{ height:100%; }

    body{
      background:var(--bg);
      color:var(--fg);
      font-family: Pretendard, Arial, "Helvetica Neue", Helvetica, sans-serif;
      font-size:14px;
      line-height:1.6;
      letter-spacing:.15px;
      -webkit-font-smoothing: antialiased;
      display:flex;
      flex-direction:column;
      min-height: 100vh;
      overflow-x: hidden;
    }

    a{ color:inherit; text-decoration:none; display: inline-block; }
    button{ font: inherit; }

    .wrap{
      max-width:var(--max);
      margin:0 auto;
      padding:0 var(--pad);
      width:100%;
    }

    /* [Header] */
    header{
      background:#ffffff;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      padding: 16px 0;
      z-index: 2000;
    }

    .topbar{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:14px;
      width: 100%;
    }

    .brand{
      font-family:"Montserrat", sans-serif;
      font-size:22.5px;
      font-weight:700;
      letter-spacing:.35px;
      line-height:1.1;
      display:inline-flex;
      align-items:center;
      gap:10px;
    }

    .brand-mark{
      height:1em;
      width:auto;
      display:block;
      object-fit:contain;
      flex:0 0 auto;
      transform: translateY(0.02em);
    }

    nav.desktop{
      display:none;
      gap:18px;
      align-items:center;
      font-size:13px;
      letter-spacing:.6px;
      white-space:nowrap;
    }

    nav.desktop a{
      font-family:"Montserrat", sans-serif;
      font-weight:600;
      padding:8px 4px;
      color: rgba(0,0,0,.82);
    }
    nav.desktop a:hover{ color: rgba(0,0,0,1); }

    .menu-btn{
      cursor: pointer;
      width: 24px;
      height: 18px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      border: 0;
      background: transparent;
      z-index: 2001;
    }

    .menu-btn span{
      display: block;
      width: 100%;
      height: 1px;
      background-color: #000;
      transition: 0.3s var(--menu-ease);
    }

    .nav-overlay {
      position: fixed;
      top: -100%;
      left: 0;
      width: 100%;
      height: 58dvh;
      background-color: #fff;
      z-index: 1500;
      transition: top 0.5s var(--menu-ease);
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding-top: 100px;
      box-shadow: 0 8px 28px 0 rgba(0,0,0,0.07);
    }

    .overlay-dimmer {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(255, 255, 255, 0); 
      z-index: 1400; 
      display: none;
    }
    body[data-menu-open="true"] .overlay-dimmer { display: block; }

    body[data-menu-open="true"] .nav-overlay {
      top: 0;
    }

    body[data-menu-open="true"] .menu-btn span:nth-child(1) { transform: translateY(8.5px) rotate(45deg); }
    body[data-menu-open="true"] .menu-btn span:nth-child(2) { opacity: 0; }
    body[data-menu-open="true"] .menu-btn span:nth-child(3) { transform: translateY(-8.5px) rotate(-45deg); }

    .drawer-nav{
      display:flex;
      flex-direction:column;
      align-items:center;
      text-align:center;
    }

    .drawer-nav a{
      font-family:"Montserrat", sans-serif;
      font-weight: 300;
      font-size: 1.1rem;
      letter-spacing: 0.1em;
      padding: 15px 0;
      color: rgba(0,0,0,.86);
      width: 100%;
    }

    /* [Main Content] */
    main{
      padding: 140px 0 80px; 
      flex:1;
    }

    .page-title{
      font-family:"Montserrat", sans-serif;
      font-size:28px;
      font-weight:700;
      text-align:center;
      margin-bottom: 22px;
      letter-spacing:.2px;
    }

    .work-item{
      margin-bottom:88px;
    }

    .work-card{
      display:block;
      width: 100%;
    }

    /* ✅ Slider 레이아웃 최적화 */
    .work-slider{
      position:relative;
      overflow:hidden;
      width:100%;
      background: #f9f9f9;
    }

    .work-track{
      position:relative;
      width:100%;
    }

    .ratio-box{
      width:100%;
    }

    /* ✅ 봉금 스타일 이미지 애니메이션 */
    .work-thumb{
      position:absolute;
      inset:0;
      width:100%;
      height:100%;
      object-fit:cover;
      opacity: 0;
      z-index: 1;
      transition: opacity var(--fade-dur) ease-in-out;
      will-change: opacity;
    }

    .work-thumb.is-active{
      opacity: 1;
      z-index: 2;
    }

    .work-caption{
      font-family:"Montserrat", sans-serif;
      display:block;
      margin-top:14px;
      text-align:center;
      font-size:16px;
      letter-spacing:.3px;
    }

    footer{
      padding:24px 0 34px;
    }

    .copyright{
      text-align:center;
      font-size:12.5px;
      color:rgba(0,0,0,.56);
      letter-spacing:.2px;
    }

    @media (min-width:1024px){
      header { padding: 60px 0; position: absolute; }
      nav.desktop { display:flex; }
      .menu-btn { display:none; }
      
      .nav-overlay {
        top: 0; 
        left: 100%; 
        width: 450px; 
        height: 100vh;
        transition: left 0.5s var(--menu-ease);
        border-left: 1px solid #eee;
        justify-content: flex-start;
        padding: 180px 0 0 80px;
        box-shadow: none;
      }
      body[data-menu-open="true"] .nav-overlay {
        left: calc(100% - 450px);
      }

      body[data-menu-open="true"] .overlay-dimmer { width: calc(100% - 450px); }

      .drawer-nav { text-align: left; align-items: flex-start; }
      .drawer-nav a { font-size: 1rem; padding: 18px 0; }

      main { padding: 220px 0 80px; }
      .page-title { font-size:32px; }
      .work-caption { font-size:17px; }
    }

    img{
      -webkit-user-drag:none;
      user-select:none;
      -webkit-user-select:none;
      -webkit-touch-callout:none;
    }
  </style>
</head>

<body>
<header>
  <div class="wrap">
    <div class="topbar">
      <a class="brand" href="index.html" aria-label="Go to Index">
        <img class="brand-mark" src="images/home/late_autumn.png" alt="" aria-hidden="true" />
        <span>Gakion</span>
      </a>

      <nav class="desktop">
        <a href="cv.html">CV</a>
        <a href="works.html" aria-current="page">Works</a>
        <a href="contact.html">Contact</a>
        <a href="shop.html">Shop</a>
      </nav>

      <button class="menu-btn" id="menuOpenBtn" type="button" aria-label="Toggle menu" onclick="toggleMenu()">
        <span></span>
        <span></span>
        <span></span>
      </button>
    </div>
  </div>
</header>

<div id="overlayDimmer" class="overlay-dimmer" onclick="toggleMenu()"></div>

<nav class="nav-overlay" id="navOverlay">
  <div class="drawer-nav">
    <a href="cv.html" onclick="toggleMenu()">CV</a>
    <a href="works.html" onclick="toggleMenu()">Works</a>
    <a href="contact.html" onclick="toggleMenu()">Contact</a>
    <a href="shop.html" onclick="toggleMenu()">Shop</a>
  </div>
</nav>

<main>
  <div class="wrap">
    <div class="page-title">Works</div>

    <div class="work-item">
      <a class="work-card" href="work_A.html">
        <div class="work-slider" data-interval="5000"> <div class="work-track">
            <div class="ratio-box"></div>
            <img class="work-thumb" src="images/works/Work_A1.jpg" alt="">
            <img class="work-thumb" src="images/works/Work_A2.jpg" alt="">
            <img class="work-thumb" src="images/works/Work_A3.jpg" alt="">
            <img class="work-thumb" src="images/works/Work_A4.jpg" alt="">
            <img class="work-thumb" src="images/works/Work_A5.jpg" alt="">
          </div>
        </div>
      </a>
      <a class="work-caption" href="work_A.html">Fox Dream</a>
    </div>
  </div>
</main>

<footer>
  <div class="wrap">
    <div class="copyright">© Gakion. All rights reserved.</div>
  </div>
</footer>

<script>
function toggleMenu() {
  const body = document.body;
  const isMenuOpen = body.dataset.menuOpen === "true";
  if (isMenuOpen) {
    body.dataset.menuOpen = "false";
    body.style.overflow = "";
  } else {
    body.dataset.menuOpen = "true";
    body.style.overflow = "hidden";
  }
}

document.getElementById('navOverlay').addEventListener('click', function(e) {
  if (e.target === this) toggleMenu();
});

/* ✅ 봉금 스타일 슬라이더 로직으로 업그레이드 */
(function(){
  const sliders = document.querySelectorAll(".work-slider");
  
  sliders.forEach(slider => {
    const imgs = Array.from(slider.querySelectorAll(".work-thumb"));
    const box = slider.querySelector(".ratio-box");
    if (imgs.length <= 1) return;

    let currentIdx = 0;
    
    // 초기 상태 설정
    imgs[0].classList.add("is-active");

    // 비율 설정 (첫 이미지 로드 시)
    const setRatio = () => { 
      if(imgs[0].naturalWidth) {
        box.style.paddingTop = (imgs[0].naturalHeight / imgs[0].naturalWidth * 100) + "%"; 
      }
    };
    imgs[0].addEventListener("load", setRatio);
    if (imgs[0].complete) setRatio();

    // ✅ 봉금 스타일 슬라이드 전환 함수
    function showNextSlide() {
      let nextIdx = (currentIdx + 1) % imgs.length;
      
      imgs.forEach((img, idx) => {
        if (idx === currentIdx) {
          img.classList.remove('is-active');
          img.style.zIndex = "1"; // 뒤로 보냄
        }
        if (idx === nextIdx) {
          img.classList.add('is-active');
          img.style.zIndex = "2"; // 앞으로 가져옴
        }
      });
      currentIdx = nextIdx;
    }

    // 봉금 스타일: 5초(5000ms) 간격으로 자동 전환
    setInterval(showNextSlide, Number(slider.dataset.interval) || 5000);
  });
})();
</script>
</body>
</html>
